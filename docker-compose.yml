services:
  db:
    image: postgres:16-alpine
    container_name: postgres_db

    ports:
      - "5432:5432"

    environment:
      POSTGRES_DB: "fines_penalties_db"
      POSTGRES_USER: "mark"
      POSTGRES_PASSWORD: "root_pass"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    restart: always

  redis:
    image: redis:7.2-alpine # Легкий и актуальный образ Redis
    container_name: redis_server
    # Открываем стандартный порт Redis 6379
    ports:
      - "6379:6379"
    command:
      redis-server --requirepass secure_redis_pass --appendonly yes

    restart: always


  # 2. Веб-интерфейс (Redis Commander)
  redis-commander:
    image: ghcr.io/joeferner/redis-commander:latest
    container_name: redis_commander_ui
    environment:
      # Настройка подключения к Redis
      REDIS_HOSTS: "local_redis:redis:6379"
      REDIS_PASSWORD: "secure_redis_pass"
      # Имя, которое будет отображаться в интерфейсе
      REDIS_CLUSTERS: "default"
    ports:
      # Открываем порт для веб-интерфейса (например, 8086)
      - "8086:8086"
    depends_on:
      - redis
    restart: always


  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka-broker
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: CONTROLLER://0.0.0.0:29093,BROKER://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: BROKER://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:29093"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,BROKER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: BROKER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka
    ports:
      - "7777:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local-kafka-kraft
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      DYNAMIC_MODE: "true"
      AUTH_TYPE: disabled
    restart: unless-stopped

volumes:
  postgres_data: { }
  redis_data: {}
